name: CI

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build wolfdotcom
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build wolfdotcom
        run: |
          ./gradlew :src-ko-wolfdotcom:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolfdotcom-apk
          path: "**/*.apk"
          retention-days: 7
